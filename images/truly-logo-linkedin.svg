<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F1628"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93B4F8"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle glow -->
  <circle cx="320" cy="80" r="120" fill="#2563EB" opacity="0.06"/>
  <circle cx="80" cy="320" r="100" fill="#7C3AED" opacity="0.05"/>

  <!-- "T" lettermark -->
  <text x="200" y="235" text-anchor="middle" font-family="'Syne', 'SF Pro Display', 'Segoe UI', sans-serif" font-size="160" font-weight="700" letter-spacing="-6" fill="url(#textGrad)">T</text>

  <!-- Accent dot -->
  <circle cx="295" cy="270" r="12" fill="url(#dotGrad)"/>

  <!-- "truly" wordmark below -->
  <text x="200" y="330" text-anchor="middle" font-family="'Syne', 'SF Pro Display', 'Segoe UI', sans-serif" font-size="32" font-weight="500" letter-spacing="8" fill="#8E8EA0">truly</text>
</svg>
