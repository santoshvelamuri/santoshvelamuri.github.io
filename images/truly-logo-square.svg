<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="133" x2="400" y2="133" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="267" x2="400" y2="267" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Glow effects -->
  <circle cx="300" cy="100" r="100" fill="#2563EB" opacity="0.07"/>
  <circle cx="100" cy="300" r="80" fill="#7C3AED" opacity="0.06"/>

  <!-- Wordmark "Truly" -->
  <text x="200" y="218" text-anchor="middle" font-family="'Syne', 'SF Pro Display', 'Segoe UI', sans-serif" font-size="82" font-weight="700" letter-spacing="-2" fill="#ffffff">Truly</text>

  <!-- Accent bar -->
  <rect x="145" y="240" width="110" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
