<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8FD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B5AA5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D6FB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BB0F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4D7FCC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Connecting lines -->
  <line x1="30" y1="25" x2="50" y2="50" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="70" y2="30" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="75" y2="50" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="70" y2="70" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="35" y2="75" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="25" y2="50" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="50" y1="50" x2="30" y2="70" stroke="#5B8FD4" stroke-width="1.2" opacity="0.4"/>
  <line x1="70" y1="30" x2="75" y2="50" stroke="#5B8FD4" stroke-width="1.2" opacity="0.3"/>
  
  <!-- Central large sphere -->
  <circle cx="50" cy="50" r="13" fill="url(#grad1)" filter="drop-shadow(0 2px 4px rgba(43,90,165,0.3))"/>
  
  <!-- Top left sphere -->
  <circle cx="30" cy="25" r="9" fill="url(#grad2)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Top right sphere -->
  <circle cx="70" cy="30" r="8" fill="url(#grad3)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Right sphere -->
  <circle cx="75" cy="50" r="9" fill="url(#grad2)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Bottom right sphere -->
  <circle cx="70" cy="70" r="7" fill="url(#grad3)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Bottom left sphere -->
  <circle cx="35" cy="75" r="8" fill="url(#grad2)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Left sphere -->
  <circle cx="25" cy="50" r="9" fill="url(#grad3)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
  
  <!-- Top left small sphere -->
  <circle cx="30" cy="70" r="6" fill="url(#grad1)" filter="drop-shadow(0 1px 3px rgba(43,90,165,0.2))"/>
</svg>
