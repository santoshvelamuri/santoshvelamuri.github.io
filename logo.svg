<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <!-- Main geometric logo with blue spheres -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B7FBF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central sphere -->
  <circle cx="50" cy="50" r="12" fill="url(#blueGradient)" opacity="0.9"/>
  
  <!-- Top sphere -->
  <circle cx="50" cy="25" r="8" fill="#4B7FBF" opacity="0.8"/>
  
  <!-- Top-right sphere -->
  <circle cx="70" cy="35" r="7" fill="#5A8FD4" opacity="0.75"/>
  
  <!-- Right sphere -->
  <circle cx="72" cy="55" r="8" fill="#4B7FBF" opacity="0.8"/>
  
  <!-- Bottom-right sphere -->
  <circle cx="65" cy="72" r="6" fill="#5A8FD4" opacity="0.7"/>
  
  <!-- Bottom sphere -->
  <circle cx="48" cy="80" r="7" fill="#4B7FBF" opacity="0.75"/>
  
  <!-- Bottom-left sphere -->
  <circle cx="28" cy="70" r="6" fill="#5A8FD4" opacity="0.7"/>
  
  <!-- Left sphere -->
  <circle cx="25" cy="50" r="8" fill="#4B7FBF" opacity="0.8"/>
  
  <!-- Top-left sphere -->
  <circle cx="32" cy="32" r="7" fill="#5A8FD4" opacity="0.75"/>
  
  <!-- Connection lines (subtle) -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="70" y2="35" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="72" y2="55" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="65" y2="72" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="48" y2="80" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="28" y2="70" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="25" y2="50" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="50" x2="32" y2="32" stroke="#4B7FBF" stroke-width="0.8" opacity="0.3"/>
</svg>
